name: Publish Modpack to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # BƯỚC 1: Phân tích Tag theo quy tắc <loader-type>_<gameVersion>_<modpackVersion>
      - name: Parse Version Info from Tag
        id: parse_tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          
          # Lấy phần đầu tiên trước dấu gạch dưới (ví dụ: fabric-vulkan)
          FIRST_PART=$(echo $TAG | cut -d'_' -f1)
          
          # Tách Loader thực sự (fabric) và Type (vulkan/sodium) nếu có
          # Nếu không có dấu '-' thì LOADER = FIRST_PART, TYPE sẽ rỗng
          LOADER=$(echo $FIRST_PART | cut -d'-' -f1)
          TYPE=$(echo $FIRST_PART | cut -d'-' -f2)
          
          # Lấy Game Version (phần thứ 2 sau dấu gạch dưới)
          GV=$(echo $TAG | cut -d'_' -f2)
          
          echo "ld=$LOADER" >> $GITHUB_OUTPUT
          echo "gv=$GV" >> $GITHUB_OUTPUT
          echo "tp=$TYPE" >> $GITHUB_OUTPUT

      # BƯỚC 2: Tải file .mrpack từ Release vừa tạo
      - name: Download .mrpack from Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });
            const asset = assets.find(a => a.name.endsWith('.mrpack'));
            if (!asset) throw new Error("Không tìm thấy file .mrpack trong Release này!");
            const fs = require('fs');
            const data = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { accept: 'application/octet-stream' }
            });
            fs.writeFileSync(asset.name, Buffer.from(data.data));

      # BƯỚC 3: Đẩy lên Modrinth
      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 'IJyTMHoI'
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          
          # Tên hiển thị trên Modrinth: Ví dụ "Update 1.0 [vulkan]"
          name: "${{ github.event.release.name }}${{ steps.parse_tag.outputs.tp != '' && format(' [{0}]', steps.parse_tag.outputs.tp) || '' }}"
          
          version: ${{ github.event.release.tag_name }}
          version-body: ${{ github.event.release.body }}
          version-type: release
          
          files: '*.mrpack'
          
          # Dữ liệu tự động bóc tách từ Tag
          loaders: ${{ steps.parse_tag.outputs.ld }}
          game-versions: ${{ steps.parse_tag.outputs.gv }}
