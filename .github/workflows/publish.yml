name: Publish Modpack to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Bỏ trống để lấy bản mới nhất'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process Information and Download
        id: data
        uses: actions/github-script@v7
        with:
          script: |
            let release;
            const manualTag = "${{ github.event.inputs.manual_tag }}";

            try {
              if (context.payload.release) {
                release = context.payload.release;
              } else if (manualTag) {
                const res = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: manualTag
                });
                release = res.data;
              } else {
                const res = await github.rest.repos.getLatestRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                release = res.data;
              }

              const tag = release.tag_name;
              const parts = tag.split('_');
              const firstPart = parts[0].split('-');
              
              core.setOutput('ld', firstPart[0]);
              core.setOutput('tp', firstPart[1] || '');
              core.setOutput('gv', parts[1]);
              core.setOutput('tag', tag);
              core.setOutput('rel_name', release.name);
              core.setOutput('rel_body', release.body);

              const { data: assets } = await github.rest.repos.listReleaseAssets({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });

              const asset = assets.find(a => a.name.endsWith('.mrpack'));
              if (!asset) throw new Error("No .mrpack file found!");

              const fileData = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
                headers: { accept: 'application/octet-stream' }
              });

              require('fs').writeFileSync(asset.name, Buffer.from(fileData.data));
            } catch (error) {
              core.setFailed(error.message);
            }

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 'IJyTMHoI'
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: "${{ steps.data.outputs.rel_name }}${{ steps.data.outputs.tp != '' && format(' [{0}]', steps.data.outputs.tp) || '' }}"
          version: ${{ steps.data.outputs.tag }}
          changelog: ${{ steps.data.outputs.rel_body }}
          version-type: release
          files: '*.mrpack'
          loaders: ${{ steps.data.outputs.ld }}
          game-versions: ${{ steps.data.outputs.gv }}
