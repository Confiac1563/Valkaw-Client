name: Publish Modpack to Modrinth

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .mrpack from Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release ? context.payload.release.id : (await github.rest.repos.getLatestRelease({owner: context.repo.owner, repo: context.repo.repo})).data.id
            });
            const asset = assets.find(a => a.name.endsWith('.mrpack'));
            if (!asset) throw new Error("Không tìm thấy file .mrpack nào trong Release!");
            const fs = require('fs');
            const data = await github.rest.repos.getReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              asset_id: asset.id,
              headers: { accept: 'application/octet-stream' }
            });
            fs.writeFileSync(asset.name, Buffer.from(data.data));

      - name: Publish Modpack to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 'IJyTMHoI'
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          name: ${{ github.event.release.name || 'Manual Upload' }}
          version: ${{ github.event.release.tag_name || github.ref_name }}
          version-type: release
          files: '*.mrpack'
          
          # THAY THẾ TỰ ĐỘNG: 
          # mc-publish sẽ cố gắng tự đọc metadata từ file .mrpack 
          # nếu bạn để trống hoặc dùng cấu hình 'auto'
          loaders: 'auto'
          game-versions: 'auto'
