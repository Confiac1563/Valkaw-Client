name: Publish Modpack to Modrinth

on:
  push:
    tags:
      - "v*" # Workflow sẽ tự động chạy khi bạn tạo và push một tag bắt đầu bằng 'v' (VD: v1.0.0)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- BƯỚC BUILD (TUỲ CHỌN) ---
      # Bỏ comment (xóa dấu #) ở các dòng dưới nếu bạn dùng packwiz để tạo file .mrpack
      # - name: Setup and Build with packwiz
      #   run: |
      #     go install github.com/packwiz/packwiz@latest
      #     packwiz modrinth export
      # -----------------------------

      - name: Publish Modpack
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Cấu hình Modrinth
          modrinth-id: 'IJyTMHoI' # Thay bằng ID dự án của bạn (VD: AANobbMI)
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          
          # Tên và phiên bản
          name: 'Release ${{ github.ref_name }}'
          version: ${{ github.ref_name }} # Tự động lấy tên tag (VD: v1.0.0) làm phiên bản
          version-type: release # Có thể đổi thành 'beta' hoặc 'alpha' nếu cần
          
          # Đường dẫn đến file modpack
          files: '*.mrpack' # Sẽ tự động tìm file .mrpack trong thư mục gốc
          
          # Cấu hình Loader (X
